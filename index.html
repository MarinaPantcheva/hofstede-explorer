<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hofstede Cultural Dimensions Explorer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rws-purple: #3E016F;
      --rws-pink:   #E60054;
      --rws-blue:   #8353FD;
      --rws-saffron:#FFC700;
      --rws-orange: #FF592C;
      --rws-berry:  #870247;
      --rws-sky:    #66C9FF;
      --rws-deep:   #120087;

      --bg:            #ffffff;
      --bg-secondary:  #f7f5fb;
      --text-primary:  #1a1a1a;
      --text-secondary:#5a6270;
      --text-tertiary: #9aa0ab;
      --border:        rgba(0,0,0,0.10);
      --border-hover:  rgba(0,0,0,0.20);
      --radius-md:     8px;
      --radius-lg:     12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:            #14101e;
        --bg-secondary:  #1e1828;
        --text-primary:  #e8e8e8;
        --text-secondary:#9aa0ab;
        --text-tertiary: #5a6270;
        --border:        rgba(255,255,255,0.10);
        --border-hover:  rgba(255,255,255,0.20);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 0 1rem 2rem;
    }

    .container { width: 100%; max-width: 820px; }

    .rws-bar {
      height: 5px;
      background: linear-gradient(90deg, #3E016F 0%, #E60054 50%, #8353FD 100%);
      margin-bottom: 2rem;
    }

    .page-header {
      margin-bottom: 1.5rem;
      padding-bottom: 1.25rem;
      border-bottom: 0.5px solid var(--border);
    }

    .page-header h1 {
      font-size: 20px; font-weight: 600;
      color: var(--text-primary); margin-bottom: 4px;
    }

    .page-header h1 span { color: var(--rws-purple); }
    @media (prefers-color-scheme: dark) { .page-header h1 span { color: var(--rws-blue); } }

    .page-header p { font-size: 13px; color: var(--text-tertiary); line-height: 1.5; }

    .section-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 0.5rem;
    }

    .label-small {
      font-size: 11px; color: var(--text-tertiary);
      letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500;
    }

    #search {
      width: 100%; font-size: 12px; padding: 6px 10px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-hover);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-family: inherit; margin-bottom: 0.5rem; outline: none;
    }
    #search:focus { border-color: var(--rws-purple); }

    #pills {
      display: flex; flex-wrap: wrap; gap: 5px;
      max-height: 180px; overflow-y: auto;
      padding: 2px 2px; margin-bottom: 1.5rem;
      scrollbar-width: thin;
    }

    .pill {
      font-size: 11px; padding: 4px 10px; border-radius: 20px;
      cursor: pointer; font-family: inherit;
      background: transparent;
      border: 0.5px solid var(--border-hover);
      color: var(--text-secondary); font-weight: 400;
      white-space: nowrap; transition: opacity 0.1s;
    }
    .pill:hover { opacity: 0.75; }
    .pill.hidden { display: none; }

    .main-grid {
      display: grid; grid-template-columns: 310px 1fr;
      gap: 2rem; align-items: start; margin-bottom: 1.75rem;
    }
    @media (max-width: 640px) { .main-grid { grid-template-columns: 1fr; } }

    .radar-wrap { position: relative; height: 310px; }

    #legend {
      display: flex; flex-wrap: wrap; gap: 10px;
      justify-content: center; margin-top: 10px;
    }

    .legend-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--text-secondary);
    }

    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    #bars { display: flex; flex-direction: column; gap: 16px; padding-top: 6px; }

    .dim-row { display: flex; flex-direction: column; gap: 3px; }

    .dim-label-row { display: flex; justify-content: space-between; align-items: baseline; }

    .dim-name { font-size: 12px; font-weight: 500; color: var(--text-primary); }

    .dim-scores { display: flex; gap: 10px; }

    .dim-score { font-size: 12px; font-weight: 600; }

    .dim-track { position: relative; height: 18px; }

    .track-bg {
      position: absolute; top: 7px; left: 0; right: 0;
      height: 4px; background: var(--border); border-radius: 2px;
    }

    .track-range { position: absolute; top: 7px; height: 4px; border-radius: 2px; }

    .track-dot {
      position: absolute; top: 3px;
      width: 12px; height: 12px; border-radius: 50%;
      border: 2px solid var(--bg);
    }

    .dim-lohi { display: flex; justify-content: space-between; }
    .dim-lohi span { font-size: 10px; color: var(--text-tertiary); }

    .glossary-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; border-top: 0.5px solid var(--border); padding-top: 1rem;
    }
    @media (max-width: 560px) { .glossary-grid { grid-template-columns: 1fr 1fr; } }

    .glossary-card { padding: 10px 12px; background: var(--bg-secondary); border-radius: var(--radius-md); }

    .glossary-card-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }

    .glossary-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

    .glossary-label { font-size: 11px; font-weight: 600; color: var(--text-primary); }

    .glossary-desc { font-size: 11px; color: var(--text-secondary); line-height: 1.5; }
  </style>
</head>
<body>
  <div class="container">

    <div class="rws-bar"></div>

    <header class="page-header">
      <h1>Hofstede's <span>cultural dimensions</span></h1>
      <p>Compare national cultures across six dimensions. Select up to three countries.</p>
    </header>

    <div class="section-header">
      <span class="label-small">Select up to 3 countries</span>
     <span style="display:flex;align-items:center;gap:12px;">
		<span id="sel-count" class="label-small">3 selected</span>
		<button id="clear-btn" onclick="sel=[];update();"
		style="font-size:11px;font-family:inherit;background:none;border:none;
           color:var(--rws-pink);cursor:pointer;padding:0;font-weight:500;
           letter-spacing:0.04em;text-transform:uppercase;">Clear all</button></span>
    </div>

    <input type="text" id="search" placeholder="Filter countries…" autocomplete="off" />
    <div id="pills"></div>

    <div class="main-grid">
      <div>
        <div class="radar-wrap">
          <canvas id="rc" role="img"
            aria-label="Radar chart comparing selected countries across six Hofstede cultural dimensions: Power Distance, Individualism, Motivation towards Achievement and Success, Uncertainty Avoidance, Long-term Orientation, and Indulgence">
            Comparison radar chart — select countries above to populate.
          </canvas>
        </div>
        <div id="legend"></div>
      </div>
      <div id="bars"></div>
    </div>

    <div class="glossary-grid" id="glossary"></div>

  </div>

  <script>
    // ── Country data: [PDI, IDV, MAS, UAI, LTO, IVR] ─────────────────────────
    // 65 countries — all NULL rows excluded
    const DATA = {
      'Africa East':       [ 64,  27,  41,  52,  32,  40],
      'Africa West':       [ 77,  20,  46,  54,   9,  78],
      'Arab countries':    [ 80,  38,  53,  68,  23,  34],
      'Argentina':         [ 49,  46,  56,  86,  20,  62],
      'Australia':         [ 38,  90,  61,  51,  21,  71],
      'Austria':           [ 11,  55,  79,  70,  60,  63],
      'Bangladesh':        [ 80,  20,  55,  60,  47,  20],
      'Belgium':           [ 65,  75,  54,  94,  82,  57],
      'Brazil':            [ 69,  38,  49,  76,  44,  59],
      'Bulgaria':          [ 70,  30,  40,  85,  69,  16],
      'Canada':            [ 39,  80,  52,  48,  36,  68],
      'Chile':             [ 63,  23,  28,  86,  31,  68],
      'China':             [ 80,  20,  66,  30,  87,  24],
      'Colombia':          [ 67,  13,  64,  80,  13,  83],
      'Croatia':           [ 73,  33,  40,  80,  58,  33],
      'Czech Rep':         [ 57,  58,  57,  74,  70,  29],
      'Denmark':           [ 18,  74,  16,  23,  35,  70],
      'El Salvador':       [ 66,  19,  40,  94,  20,  89],
      'Estonia':           [ 40,  60,  30,  60,  82,  16],
      'Finland':           [ 33,  63,  26,  59,  38,  57],
      'France':            [ 68,  71,  43,  86,  63,  48],
      'Germany':           [ 35,  67,  66,  65,  83,  40],
      'Great Britain':     [ 35,  89,  66,  35,  51,  69],
      'Greece':            [ 60,  35,  57, 112,  45,  50],
      'Hong Kong':         [ 68,  25,  57,  29,  61,  17],
      'Hungary':           [ 46,  80,  88,  82,  58,  31],
      'India':             [ 77,  48,  56,  40,  51,  26],
      'Indonesia':         [ 78,  14,  46,  48,  62,  38],
      'Iran':              [ 58,  41,  43,  59,  14,  40],
      'Ireland':           [ 28,  70,  68,  35,  24,  65],
      'Italy':             [ 50,  76,  70,  75,  61,  30],
      'Japan':             [ 54,  46,  95,  92,  88,  42],
      'Korea South':       [ 60,  18,  39,  85, 100,  29],
      'Latvia':            [ 44,  70,   9,  63,  69,  13],
      'Lithuania':         [ 42,  60,  19,  65,  82,  16],
      'Luxembourg':        [ 40,  60,  50,  70,  64,  56],
      'Malaysia':          [104,  26,  50,  36,  41,  57],
      'Malta':             [ 56,  59,  47,  96,  47,  66],
      'Mexico':            [ 81,  30,  69,  82,  24,  97],
      'Morocco':           [ 70,  46,  53,  68,  14,  25],
      'Netherlands':       [ 38,  80,  14,  53,  67,  68],
      'New Zealand':       [ 22,  79,  58,  49,  33,  75],
      'Norway':            [ 31,  69,   8,  50,  35,  55],
      'Pakistan':          [ 55,  14,  50,  70,  50,   0],
      'Peru':              [ 64,  16,  42,  87,  25,  46],
      'Philippines':       [ 94,  32,  64,  44,  27,  42],
      'Poland':            [ 68,  60,  64,  93,  38,  29],
      'Portugal':          [ 63,  27,  31, 104,  28,  33],
      'Romania':           [ 90,  30,  42,  90,  52,  20],
      'Russia':            [ 93,  39,  36,  95,  81,  20],
      'Serbia':            [ 86,  25,  43,  92,  52,  28],
      'Singapore':         [ 74,  20,  48,   8,  72,  46],
      'Slovak Rep':        [104,  52, 110,  51,  77,  28],
      'Slovenia':          [ 71,  27,  19,  88,  49,  48],
      'Spain':             [ 57,  51,  42,  86,  48,  44],
      'Sweden':            [ 31,  71,   5,  29,  53,  78],
      'Switzerland':       [ 34,  68,  70,  58,  74,  66],
      'Taiwan':            [ 58,  17,  45,  69,  93,  49],
      'Thailand':          [ 64,  20,  34,  64,  32,  45],
      'Trinidad & Tobago': [ 47,  16,  58,  55,  13,  80],
      'Turkey':            [ 66,  37,  45,  85,  46,  49],
      'USA':           	 [ 40,  91,  62,  46,  26,  68],
      'Uruguay':           [ 61,  36,  38, 100,  26,  53],
      'Venezuela':         [ 81,  12,  73,  76,  16, 100],
      'Vietnam':           [ 70,  20,  40,  30,  57,  35],
    };

    // ── Dimension definitions ─────────────────────────────────────────────────
    const DIMS = [
      {
        abbr: 'PDI',
        name: 'Power distance',
        radarLabel: ['Power', 'distance'],
        lo: 'Equal', hi: 'Hierarchical',
        desc: 'Acceptance of unequal power distribution between people in institutions and organisations.'
      },
      {
        abbr: 'IDV',
        name: 'Individualism',
        radarLabel: 'Individualism',
        lo: 'Collectivist', hi: 'Individualist',
        desc: 'Preference for acting as an individual versus as a member of a tight-knit group.'
      },
      {
        abbr: 'MAS',
        name: 'Motivation towards achievement & success',
        radarLabel: ['Achievement', '& success'],
        lo: 'Caring for others & quality of life', hi: 'Achievement & success',
        desc: 'Preference for achievement, heroism, and material rewards versus cooperation, modesty, and quality of life.'
      },
      {
        abbr: 'UAI',
        name: 'Uncertainty avoidance',
        radarLabel: ['Uncertainty', 'avoidance'],
        lo: 'Tolerant', hi: 'Risk-averse',
        desc: 'Degree of discomfort with ambiguity — tendency to follow rules and seek structure.'
      },
      {
        abbr: 'LTO',
        name: 'Long-term orientation',
        radarLabel: ['Long-term', 'orientation'],
        lo: 'Short-term', hi: 'Long-term',
        desc: 'Preference for future rewards through perseverance versus adherence to past traditions.'
      },
      {
        abbr: 'IVR',
        name: 'Indulgence',
        radarLabel: 'Indulgence',
        lo: 'Restrained', hi: 'Indulgent',
        desc: 'The degree to which society allows free gratification of basic human drives and desires.'
      },
    ];

    // ── RWS brand colours ─────────────────────────────────────────────────────
    const CC  = ['#3E016F', '#E60054', '#8353FD'];
    const CBG = ['rgba(62,1,111,.10)', 'rgba(230,0,84,.10)', 'rgba(131,83,253,.10)'];
    const DC  = ['#3E016F', '#E60054', '#8353FD', '#FFC700', '#FF592C', '#870247'];

    // Some scores exceed 100 (Greece UAI=112, Slovak Rep MAS=110)
    const CHART_MAX = 120;

    let sel   = ['U.S.A.', 'Japan', 'Sweden'];
    let chart = null;

    const dark = () => matchMedia('(prefers-color-scheme:dark)').matches;
    const gc   = () => dark() ? 'rgba(255,255,255,.07)' : 'rgba(0,0,0,.06)';
    const tc   = () => dark() ? '#555' : '#bbb';
    const lc   = () => dark() ? '#ccc' : '#444';

    // ── Search ────────────────────────────────────────────────────────────────
    document.getElementById('search').addEventListener('input', function () {
      const q = this.value.toLowerCase();
      document.querySelectorAll('.pill').forEach(btn => {
        btn.classList.toggle('hidden', !!(q && !btn.textContent.toLowerCase().includes(q)));
      });
    });

    // ── Pills ─────────────────────────────────────────────────────────────────
    function rebuildPills() {
      const container = document.getElementById('pills');
      const query     = document.getElementById('search').value.toLowerCase();
      container.innerHTML = '';

      Object.keys(DATA).sort().forEach(name => {
        const idx    = sel.indexOf(name);
        const active = idx >= 0;
        const btn    = document.createElement('button');
        btn.className   = 'pill' + (query && !name.toLowerCase().includes(query) ? ' hidden' : '');
        btn.textContent = name;
        if (active) {
          btn.style.background  = CC[idx] + '18';
          btn.style.border      = '1.5px solid ' + CC[idx];
          btn.style.color       = CC[idx];
          btn.style.fontWeight  = '600';
        }
        btn.addEventListener('click', () => {
          if (active) {
            if (sel.length > 1) sel = sel.filter(s => s !== name);
          } else {
            if (sel.length < 3) sel.push(name);
          }
          update();
        });
        container.appendChild(btn);
      });
      document.getElementById('sel-count').textContent = sel.length + ' selected';
    }

    // ── Radar chart ───────────────────────────────────────────────────────────
    function rebuildChart() {
      const ctx      = document.getElementById('rc').getContext('2d');
      const datasets = sel.map((name, i) => ({
        label:                name,
        data:                 DATA[name],
        borderColor:          CC[i],
        backgroundColor:      CBG[i],
        borderWidth:          2,
        pointBackgroundColor: CC[i],
        pointBorderColor:     CC[i],
        pointRadius:          4,
        pointHoverRadius:     6,
      }));

      const radarLabels = DIMS.map(d => d.radarLabel);

      if (chart) {
        chart.data.labels   = radarLabels;
        chart.data.datasets = datasets;
        chart.options.scales.r.grid.color        = gc();
        chart.options.scales.r.angleLines.color  = gc();
        chart.options.scales.r.ticks.color       = tc();
        chart.options.scales.r.pointLabels.color = lc();
        chart.update();
      } else {
        chart = new Chart(ctx, {
          type: 'radar',
          data: { labels: radarLabels, datasets },
          options: {
            responsive:          true,
            maintainAspectRatio: false,
            plugins: {
              legend:  { display: false },
              tooltip: {
                callbacks: {
                  title: items => items[0].dataset.label,
                  label: c => DIMS[c.dataIndex].name + ': ' + c.parsed.r,
                },
              },
            },
            scales: {
              r: {
                min: 0, max: CHART_MAX,
                ticks: {
                  stepSize: 30,
                  color: tc(),
                  backdropColor: 'transparent',
                  font: { size: 10 },
                },
                grid:       { color: gc() },
                angleLines: { color: gc() },
                pointLabels: {
                  color: lc(),
                  font: { size: 11, weight: '500' },
                  padding: 8,
                },
              },
            },
          },
        });
      }
    }

    // ── Legend ────────────────────────────────────────────────────────────────
    function rebuildLegend() {
      const container = document.getElementById('legend');
      container.innerHTML = '';
      sel.forEach((name, i) => {
        const item = document.createElement('span');
        item.className = 'legend-item';
        const dot = document.createElement('span');
        dot.className        = 'legend-dot';
        dot.style.background = CC[i];
        item.appendChild(dot);
        item.appendChild(document.createTextNode(name));
        container.appendChild(item);
      });
    }

    // ── Dimension bars ────────────────────────────────────────────────────────
    function rebuildBars() {
      const container = document.getElementById('bars');
      container.innerHTML = '';

      DIMS.forEach((dim, di) => {
        const scores = sel.map(n => DATA[n][di]);
        const minV   = Math.min(...scores);
        const maxV   = Math.max(...scores);

        const row = document.createElement('div');
        row.className = 'dim-row';

        const labelRow = document.createElement('div');
        labelRow.className = 'dim-label-row';

        const nameEl       = document.createElement('span');
        nameEl.className   = 'dim-name';
        nameEl.textContent = dim.name;

        const scoresEl = document.createElement('span');
        scoresEl.className = 'dim-scores';
        sel.forEach((name, ci) => {
          const s       = document.createElement('span');
          s.className   = 'dim-score';
          s.style.color = CC[ci];
          s.textContent = DATA[name][di];
          scoresEl.appendChild(s);
        });

        labelRow.appendChild(nameEl);
        labelRow.appendChild(scoresEl);

        const track = document.createElement('div');
        track.className = 'dim-track';

        const bg = document.createElement('div');
        bg.className = 'track-bg';
        track.appendChild(bg);

        // Scale all positions to CHART_MAX
        if (sel.length > 1 && maxV > minV) {
          const range = document.createElement('div');
          range.className        = 'track-range';
          range.style.left       = (minV / CHART_MAX * 100) + '%';
          range.style.width      = ((maxV - minV) / CHART_MAX * 100) + '%';
          range.style.background = DC[di] + '28';
          track.appendChild(range);
        }

        sel.forEach((name, ci) => {
          const score = DATA[name][di];
          const pct   = score / CHART_MAX * 100;
          const dot   = document.createElement('div');
          dot.className        = 'track-dot';
          dot.style.background = CC[ci];
          dot.style.left       = `clamp(0px, calc(${pct}% - 6px), calc(100% - 12px))`;
          dot.title            = name + ': ' + score;
          track.appendChild(dot);
        });

        const loHi = document.createElement('div');
        loHi.className = 'dim-lohi';
        loHi.innerHTML = `<span>${dim.lo}</span><span>${dim.hi}</span>`;

        row.appendChild(labelRow);
        row.appendChild(track);
        row.appendChild(loHi);
        container.appendChild(row);
      });
    }

    // ── Glossary (static) ─────────────────────────────────────────────────────
    function buildGlossary() {
      const container = document.getElementById('glossary');
      DIMS.forEach((dim, di) => {
        const card = document.createElement('div');
        card.className = 'glossary-card';

        const header = document.createElement('div');
        header.className = 'glossary-card-header';

        const dot = document.createElement('span');
        dot.className        = 'glossary-dot';
        dot.style.background = DC[di];

        const label = document.createElement('span');
        label.className   = 'glossary-label';
        label.textContent = dim.name;

        header.appendChild(dot);
        header.appendChild(label);

        const desc = document.createElement('p');
        desc.className   = 'glossary-desc';
        desc.textContent = dim.desc;

        card.appendChild(header);
        card.appendChild(desc);
        container.appendChild(card);
      });
    }

    // ── Orchestration ─────────────────────────────────────────────────────────
    function update() {
      rebuildPills();
      rebuildChart();
      rebuildLegend();
      rebuildBars();
    }

    buildGlossary();
    update();

    matchMedia('(prefers-color-scheme:dark)').addEventListener('change', () => {
      if (chart) {
        chart.options.scales.r.grid.color        = gc();
        chart.options.scales.r.angleLines.color  = gc();
        chart.options.scales.r.ticks.color       = tc();
        chart.options.scales.r.pointLabels.color = lc();
        chart.update();
      }
    });
  </script>
</body>
</html>
